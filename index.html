<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MANNAL Korean Card Master</title>
    <meta property="og:title" content="MANNAL Korean Card Game">
    <meta property="og:description" content="그림과 단어로 한국어를 더 재미있게 배워보세요!">
    <meta property="og:type" content="website">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        :root {
            --check-green: #03c75a;
            --uph-blue: #0078D7;
            --bg-color: #f5f6f8;
            --text-dark: #222222;
            --text-gray: #888888;
            --border-light: #e3e5e8;
            --card-back: #006782;
        }

        body { 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background: white; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 설정 모달창 레이아웃 수정 */
        #lang-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: start;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-y: auto;
        }

        #lang-modal h2 { margin-bottom: 15px; font-size: 18px; color: var(--text-dark); }
        #lang-modal h3 { margin-top: 20px; margin-bottom: 10px; font-size: 14px; color: var(--text-gray); }
        
        .select-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid var(--uph-blue);
            background-color: white;
        }

        /* 뒷면 선택 버튼 스타일 */
        .option-group {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .opt-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .opt-btn.active {
            border-color: var(--uph-blue);
            background-color: #e7f3ff;
            color: var(--uph-blue);
        }

        .lang-btn {
            width: 100%;
            padding: 15px; margin-bottom: 8px;
            background-color: var(--uph-blue); color: white;
            border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .lang-btn:disabled { background-color: #ccc; }

        .sticky-header {
            background: linear-gradient(135deg, #0078D7, #005A9E);
            color: white; padding: 10px 15px;
            border-bottom-left-radius: 15px; border-bottom-right-radius: 15px;
            z-index: 10; flex-shrink: 0;
        }

        .game-dashboard { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .stat-box { text-align: center; flex: 1; background: rgba(255,255,255,0.1); padding: 5px 0; border-radius: 10px; }
        .stat-title { font-size: 11px; opacity: 0.9; }
        .stat-value { font-size: 18px; font-weight: bold; }

        .game-view {
            flex: 1; padding: 10px; display: grid; gap: 8px;
            background-color: var(--bg-color); align-content: start; overflow-y: auto;
        }

        .card {
            width: 100%; aspect-ratio: 1 / 1.1; background-color: white;
            border-radius: 6px; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.3s;
        }
        .card.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 6px;
            border: 1px solid var(--border-light); box-sizing: border-box; padding: 4px;
        }

        .card-front { background-color: white; transform: rotateY(180deg); font-weight: bold; }
        .card-img { font-size: 1.8em; margin-bottom: 2px; }
        .card-ko { font-size: 13px; color: #111; }
        .card-lang { font-size: 10px; color: var(--uph-blue); line-height: 1.1; }

        .card-back { background-color: var(--card-back); color: white; }
        .back-emoji { font-size: 2em; }
        .back-num { font-size: 24px; font-weight: bold; }

        .card.matched { visibility: hidden; opacity: 0; transition: opacity 0.4s, visibility 0.4s; }

        .footer-wrap { padding: 10px 20px; background-color: white; border-top: 1px solid var(--border-light); display: flex; gap: 10px; }
        .btn-main { flex: 1; padding: 12px; background-color: var(--check-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background-color: #333; }

        .toast {
            visibility: hidden; min-width: 200px; background-color: rgba(51, 51, 51, 0.9);
            color: #fff; text-align: center; border-radius: 25px; padding: 10px;
            position: fixed; z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%);
            font-size: 13px; opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="lang-modal">
        <h2 style="color:var(--uph-blue)">KOREAN CARD MASTER</h2>
        
        <h3>1. 학습 단원 선택</h3>
        <select id="sheet-select" class="select-box">
            <option value="all">전체 단어 (all)</option>
            <option value="1과 1항">1과 1항</option>
            <option value="1과 2항">1과 2항</option>
            <option value="2과 1항">2과 1항</option>
            <option value="2과 2항">2과 2항</option>
            <option value="3과 1항">3과 1항</option>
            <option value="3과 2항">3과 2항</option>
            <option value="4과 1항">4과 1항</option>
            <option value="4과 2항">4과 2항</option>
            <option value="5과 1항">5과 1항</option>
            <option value="5과 2항">5과 2항</option>
            <option value="all">나머지 시트들...</option>
        </select>

        <h3>2. 카드 뒷면 스타일</h3>
        <div class="option-group">
            <button class="opt-btn active" id="back-twin" onclick="setBackStyle('twin')">웃는 쌍둥이<br>👦👧</button>
            <button class="opt-btn" id="back-num" onclick="setBackStyle('num')">카드 번호<br>1, 2, 3...</button>
        </div>

        <h3>3. 학습 언어 선택 및 시작</h3>
        <button class="lang-btn" id="btn-vi" onclick="startGame('vi')" disabled>베트남어 (Tiếng Việt)</button>
        <button class="lang-btn" id="btn-uz" onclick="startGame('uz')" disabled>우즈베크어 (O'zbekcha)</button>
        <button class="lang-btn" id="btn-mn" onclick="startGame('mn')" disabled>몽골어 (Монгол хэл)</button>
        <button class="lang-btn" id="btn-en" onclick="startGame('en')" disabled>영어 (English)</button>
    </div>

    <div class="sticky-header">
        <div style="text-align:center; font-size:12px; margin-bottom:8px; font-weight:bold;">STAGE <span id="stage-num">1</span></div>
        <div class="game-dashboard">
            <div class="stat-box">
                <div class="stat-title">시간</div>
                <div class="stat-value" id="timer">00:00</div>
            </div>
            <div class="stat-box" style="background: rgba(255, 215, 0, 0.2);">
                <div class="stat-title">시도</div>
                <div class="stat-value" id="tries" style="color:#FFD700;">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">남은 짝</div>
                <div class="stat-value" id="remains">0</div>
            </div>
        </div>
    </div>

    <div class="game-view" id="game-board"></div>

    <div class="footer-wrap">
        <button class="btn-main" onclick="confirmReset()">🔄 설정 변경</button>
        <button class="btn-main btn-secondary" onclick="shareResult()">📤 결과 공유</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const FILE_ID = "1ZCbw5oRfmo95P4gVUaisxH987Qm4DOk7";
    const SHEET_NAMES = ["all", "1과 1항", "1과 2항", "2과 1항", "2과 2항", "3과 1항", "3과 2항", "4과 1항", "4과 2항", "5과 1항", "5과 2항", "6과 1항", "6과 2항", "7과 1항", "7과 2항", "8과 1항", "8과 2항", "9과 1항", "9과 2항", "10과 1항", "10과 2항", "11과 1항", "11과 2항", "12과 1항", "12과 2항", "13과 1항", "13과 2항", "14과 1항", "14과 2항", "15과 1항", "15과 2항", "16과 1항", "16과 2항"];

    let wordData = []; 
    let stages = [];   
    let currentLang = 'en'; 
    let backStyle = 'twin'; // 기본값: 쌍둥이
    let currentStageIdx = 0;
    let flippedCards = [];
    let matchedCount = 0;
    let tries = 0;
    let timerInterval;
    let seconds = 0;
    let isLock = false;
    let audioCtx = null;

    google.charts.load('current', {packages: ['corechart']});
    google.charts.setOnLoadCallback(initializeApp);

    function initializeApp() {
        const select = document.getElementById('sheet-select');
        select.innerHTML = ''; 
        SHEET_NAMES.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.innerText = name;
            select.appendChild(opt);
        });
        document.querySelectorAll('.lang-btn').forEach(btn => btn.disabled = false);
    }

    // 뒷면 스타일 선택 처리
    function setBackStyle(style) {
        backStyle = style;
        document.getElementById('back-twin').classList.toggle('active', style === 'twin');
        document.getElementById('back-num').classList.toggle('active', style === 'num');
    }

    function startGame(langCode) {
        const sheetName = document.getElementById('sheet-select').value;
        currentLang = langCode;
        document.getElementById('lang-modal').style.display = 'none';
        fetchSheetData(sheetName);
    }

    function fetchSheetData(sheetName) {
        // 💡 [핵심 수정 1] 명시적으로 A열부터 F열까지 전부 가져오라고 명령하고 (select A,B,C,D,E,F)
        // 💡 [핵심 수정 2] 구글의 과거 캐시를 무시하도록 매번 새로운 난수(nocache)를 붙입니다.
        const queryUrl = `https://docs.google.com/spreadsheets/d/${FILE_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tq=${encodeURIComponent("select A,B,C,D,E,F")}&nocache=${new Date().getTime()}`;
        const query = new google.visualization.Query(queryUrl);
        query.send(handleQueryResponse);
    }

    function handleQueryResponse(response) {
        if (response.isError()) {
            alert("데이터 로딩 실패! 구글 드라이브 권한을 확인해주세요.");
            document.getElementById('lang-modal').style.display = 'flex';
            return;
        }

        const dt = response.getDataTable();
        const rows = dt.getNumberOfRows();
        const cols = dt.getNumberOfColumns();
        wordData = [];

        for (let i = 0; i < rows; i++) {
            const ko = dt.getValue(i, 0);
            if (!ko) continue;
            
            // 💡 [핵심 수정 3] 엑셀 F열(인덱스 5) 이모지를 확실하게 캐치하도록 검증 로직 강화
            let emojiValue = '💡';
            if (cols > 5 && dt.getValue(i, 5) != null) {
                let fetchedEmoji = dt.getValue(i, 5).toString().trim();
                if (fetchedEmoji !== '') {
                    emojiValue = fetchedEmoji;
                }
            }

            wordData.push({
                ko: ko,
                vi: (cols > 1 && dt.getValue(i, 1)) ? dt.getValue(i, 1) : '',
                uz: (cols > 2 && dt.getValue(i, 2)) ? dt.getValue(i, 2) : '',
                mn: (cols > 3 && dt.getValue(i, 3)) ? dt.getValue(i, 3) : '',
                en: (cols > 4 && dt.getValue(i, 4)) ? dt.getValue(i, 4) : '',
                emoji: emojiValue
            });
        }

        generateStages(wordData.length);
        currentStageIdx = 0;
        initGame();
    }

    function generateStages(totalWords) {
        stages = [];
        let p = 5;
        while (p <= totalWords) {
            stages.push({ pairs: p, cols: p <= 5 ? 3 : (p <= 10 ? 4 : 5) });
            p += 5;
        }
        if (totalWords % 5 !== 0 && totalWords > (p - 5)) stages.push({ pairs: totalWords, cols: 5 });
        if (stages.length === 0 && totalWords > 0) stages.push({ pairs: totalWords, cols: 3 });
    }

    function initGame() {
        const stage = stages[currentStageIdx];
        const board = document.getElementById('game-board');
        document.getElementById('stage-num').innerText = currentStageIdx + 1;
        board.innerHTML = ''; matchedCount = 0; flippedCards = []; isLock = false;
        board.style.gridTemplateColumns = `repeat(${stage.cols}, 1fr)`;

        const selected = [...wordData].sort(() => 0.5 - Math.random()).slice(0, stage.pairs);
        const deck = [...selected, ...selected].sort(() => 0.5 - Math.random());
        
        document.getElementById('remains').innerText = stage.pairs;

        deck.forEach((item, idx) => {
            const cardEl = document.createElement('div');
            cardEl.classList.add('card');
            cardEl.dataset.ko = item.ko;

            // 카드 뒷면 내용 결정 (쌍둥이 vs 번호)
            let backContent = '';
            if(backStyle === 'twin') {
                backContent = `<div class="back-emoji">👦👧</div>`; // 웃는 쌍둥이
            } else {
                backContent = `<div class="back-num">${idx + 1}</div>`; // 카드 순서 번호
            }

            cardEl.innerHTML = `
                <div class="card-back">${backContent}</div>
                <div class="card-front">
                    <div class="card-img">${item.emoji}</div>
                    <div class="card-ko">${item.ko}</div>
                    <div class="card-lang">${item[currentLang]}</div>
                </div>
            `;
            cardEl.onclick = () => { if(!audioCtx) playXylophone(); flipCard(cardEl); };
            board.appendChild(cardEl);
        });

        if (currentStageIdx === 0) {
            tries = 0; document.getElementById('tries').innerText = '0';
            startTimer();
        }
    }

    /* --- 기존 게임 엔진 로직 (미수정) --- */
    function playXylophone() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const notes = [523.25, 659.25, 783.99]; 
        notes.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
        });
    }

    function speakWord(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text.replace(/ \(.*\)/, ""));
            msg.lang = 'ko-KR'; msg.pitch = 1.5; msg.rate = 1.2;
            window.speechSynthesis.speak(msg);
        }
    }

    function flipCard(card) {
        if (isLock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        speakWord(card.dataset.ko);
        card.classList.add('flipped');
        flippedCards.push(card);
        if (flippedCards.length === 2) {
            tries++; document.getElementById('tries').innerText = tries;
            checkMatch();
        }
    }

    function checkMatch() {
        isLock = true;
        const [c1, c2] = flippedCards;
        if (c1.dataset.ko === c2.dataset.ko) {
            playXylophone();
            setTimeout(() => {
                c1.classList.add('matched'); c2.classList.add('matched');
                matchedCount += 2;
                document.getElementById('remains').innerText = (stages[currentStageIdx].pairs * 2 - matchedCount) / 2;
                flippedCards = []; isLock = false;
                if (matchedCount === stages[currentStageIdx].pairs * 2) nextStage();
            }, 500);
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped'); c2.classList.remove('flipped');
                flippedCards = []; isLock = false;
            }, 800);
        }
    }

    function nextStage() {
        if (currentStageIdx < stages.length - 1) {
            showToast(`STAGE ${currentStageIdx + 1} CLEAR!`);
            currentStageIdx++;
            setTimeout(initGame, 1500);
        } else {
            clearInterval(timerInterval);
            speakWord("마스터 클리어! 축하합니다!");
            showToast("🎊 MASTER CLEAR!");
            setTimeout(confettiEffect, 500);
        }
    }

    function startTimer() {
        clearInterval(timerInterval); seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function confirmReset() {
        if (confirm("설정 화면으로 돌아가시겠습니까?")) { 
            clearInterval(timerInterval);
            document.getElementById('lang-modal').style.display = 'flex';
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function shareResult() {
        const time = document.getElementById('timer').innerText;
        const tryCnt = document.getElementById('tries').innerText;
        const text = `[MANNAL KOREAN MASTER]\n⏱ 시간: ${time}\n🔢 시도: ${tryCnt}회\n학습 단원: ${document.getElementById('sheet-select').value}\n함께 한국어 공부해요!`;
        if (navigator.share) {
            navigator.share({ title: 'Korean Card Master', text: text, url: window.location.href });
        } else {
            navigator.clipboard.writeText(text).then(() => showToast("✅ 기록이 복사되었습니다!"));
        }
    }

    function confettiEffect() {
        const time = document.getElementById('timer').innerText;
        const tryCnt = document.getElementById('tries').innerText;
        if(confirm(`축하합니다! 모든 스테이지 클리어!\n최종 시간: ${time}\n총 시도: ${tryCnt}회\n\n기록을 복사하고 종료하시겠습니까?`)) {
            navigator.clipboard.writeText(`시간: ${time}, 시도: ${tryCnt}`).then(() => {
                alert("기록 복사 완료!");
                window.location.href = "about:blank";
            });
        }
    }
</script>
</body>
</html>
